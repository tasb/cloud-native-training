apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontend.fullname" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
data:
  # nginx.conf with two responsibilities:
  #   1. Proxy /api/ requests to the backend service (no hardcoded backend URL in JS).
  #   2. Inject window.API_BASE_URL = "" via sub_filter so the frontend JS
  #      builds API URLs relative to the current origin, which nginx then proxies.
  nginx.conf: |
    server {
        listen 80;
        server_name _;

        # ── Static assets ──────────────────────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Inject config.js script tag before </head> so window.API_BASE_URL
            # is set to "" (same origin) before the app JS runs.
            sub_filter '</head>' '<script src="/config.js"></script></head>';
            sub_filter_once on;
        }

        # ── Runtime configuration for the frontend app ─────────────────────
        # Sets window.API_BASE_URL = "" so fetch calls use relative paths
        # (e.g. /api/items) which nginx proxies to the backend service.
        location = /config.js {
            default_type application/javascript;
            return 200 'window.API_BASE_URL = "";';
        }

        # ── Backend API proxy ──────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://{{ .Values.backend.serviceName }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.port }}/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Health check endpoint ──────────────────────────────────────────
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
