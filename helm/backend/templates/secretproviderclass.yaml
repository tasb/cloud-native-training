# SecretProviderClass — instructs the AKS Key Vault CSI driver to:
#   1. Pull the DB password from Azure Key Vault at pod startup.
#   2. Sync it into a Kubernetes Secret ({{ .Values.keyVault.k8sSecretName }}).
#
# The deployment mounts a CSI volume referencing this class, which triggers
# the sync. The K8s Secret is then consumed as a normal env var.
#
# Prerequisites:
#   - AKS Key Vault Secrets Store CSI Driver addon must be enabled.
#   - The CSI driver managed identity must have "Key Vault Secrets User" on the vault.
#     Identity client ID: .Values.keyVault.identityClientId
#     (terraform output: kv_csi_identity_client_id)
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "backend.fullname" . }}-kv
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity:        "false"
    useVMManagedIdentity:  "false"
    clientID:              {{ required "keyVault.identityClientId is required" .Values.keyVault.identityClientId | quote }}
    keyvaultName:          {{ required "keyVault.name is required" .Values.keyVault.name | quote }}
    tenantId:              {{ required "keyVault.tenantId is required" .Values.keyVault.tenantId | quote }}
    objects: |
      array:
      - |
        objectName: {{ .Values.keyVault.secretName | quote }}
        objectType: secret
        objectVersion: ""
  # Sync the Key Vault secret value into a Kubernetes Secret so the deployment
  # can reference it as a standard secretKeyRef env var.
  secretObjects:
    - secretName: {{ .Values.keyVault.k8sSecretName | quote }}
      type: Opaque
      data:
        - objectName: {{ .Values.keyVault.secretName | quote }}
          key: POSTGRES_PASSWORD
