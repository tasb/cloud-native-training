apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "backend.selectorLabels" . | nindent 8 }}
        # Required for AKS Workload Identity (used by CSI driver federation)
        azure.workload.identity/use: "true"
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      # Tolerate the AKS spot node taint so pods schedule on the spot user pool
      tolerations:
        - key: "kubernetes.azure.com/scalesetpriority"
          operator: "Equal"
          value: "spot"
          effect: "NoSchedule"
      containers:
        - name: backend
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          # ── DB connection (non-sensitive) from ConfigMap ────────────────────
          envFrom:
            - configMapRef:
                name: {{ include "backend.fullname" . }}-config
          env:
            # ── DB password from Key Vault via CSI-synced K8s Secret ─────────
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keyVault.k8sSecretName }}
                  key: POSTGRES_PASSWORD
            # ── OpenTelemetry ─────────────────────────────────────────────────
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            - name: OTEL_TRACES_SAMPLER
              value: {{ .Values.otel.tracesSampler | quote }}
            {{- if .Values.otel.exporterEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.exporterEndpoint | quote }}
            {{- else }}
            - name: OTEL_TRACES_EXPORTER
              value: "none"
            {{- end }}
          # ── The CSI volume MUST be mounted to trigger Key Vault secret sync ─
          volumeMounts:
            - name: kv-secrets
              mountPath: /mnt/kv-secrets
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        # Mounting this CSI volume triggers the SecretProviderClass to pull
        # the secret from Key Vault and sync it into {{ .Values.keyVault.k8sSecretName }}.
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "backend.fullname" . }}-kv
