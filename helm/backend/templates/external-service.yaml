# ExternalName service — maps a K8s service DNS name to the Azure PostgreSQL FQDN.
# The backend connects to {{ .Values.database.externalServiceName }}:5432 as if it were
# a local service; Kubernetes resolves it to the actual Azure PSQL FQDN.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.database.externalServiceName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  type: ExternalName
  externalName: {{ required "database.externalFqdn is required" .Values.database.externalFqdn | quote }}
  ports:
    - port: 5432
      protocol: TCP
      name: postgresql
